name: Super CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Backend/requirements.txt
        # Install additional QA tools
        pip install flake8 pytest

    - name: Check for Syntax Errors (py_compile)
      run: |
        python -m py_compile Backend/*.py Phase_two/*.py Phase_One/*.py

    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 Backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 Phase_two/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 Phase_One/ --count --select=E9,F63,F7,F82 --show-source --statistics
